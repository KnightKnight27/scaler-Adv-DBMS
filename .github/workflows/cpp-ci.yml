name: C/C++ CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt update && sudo apt install -y build-essential cmake
      - name: Configure
        run: cmake -S . -B build
      - name: Build
        run: cmake --build build -- -j$(nproc)
      - name: Run executables
        run: |
          if [ -x build/storage_buffer/storage_buffer_main ]; then build/storage_buffer/storage_buffer_main || true; fi
          if [ -x build/lab3/24bcs10276/lab3_code ]; then build/lab3/24bcs10276/lab3_code || true; fi
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cpp-binaries
          path: |
            build/storage_buffer/storage_buffer_main
            build/lab3/24bcs10276/lab3_code
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure (MSVC)
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64
      - name: Build (Release)
        run: cmake --build build --config Release -- /m
      - name: Run Windows executables
        shell: powershell
        run: |
          if (Test-Path build\storage_buffer\Release\storage_buffer_main.exe) { build\storage_buffer\Release\storage_buffer_main.exe } else { Write-Output 'storage_buffer binary not found' }
          if (Test-Path build\lab3\24bcs10276\Release\lab3_code.exe) { build\lab3\24bcs10276\Release\lab3_code.exe } else { Write-Output 'lab3 binary not found' }
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cpp-windows-binaries
          path: |
            build/storage_buffer/Release/storage_buffer_main.exe
            build/lab3/24bcs10276/Release/lab3_code.exe
