name: C/C++ CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt update && sudo apt install -y build-essential cmake
      - name: Configure
        run: cmake -S . -B build
      - name: Build
        run: cmake --build build -- -j$(nproc)
      - name: Run executables
        run: |
          mkdir -p artifacts/logs
          if [ -x build/storage_buffer/storage_buffer_main ]; then build/storage_buffer/storage_buffer_main > artifacts/logs/storage_buffer.txt 2>&1 || true; else echo 'not found' > artifacts/logs/storage_buffer.txt; fi
          if [ -x build/lab3/24bcs10276/lab3_code ]; then build/lab3/24bcs10276/lab3_code > artifacts/logs/lab3.txt 2>&1 || true; else echo 'not found' > artifacts/logs/lab3.txt; fi
          # Package binaries and logs
          mkdir -p artifacts/bin
          if [ -x build/storage_buffer/storage_buffer_main ]; then cp build/storage_buffer/storage_buffer_main artifacts/bin/ || true; fi
          if [ -x build/lab3/24bcs10276/lab3_code ]; then cp build/lab3/24bcs10276/lab3_code artifacts/bin/ || true; fi
          tar -C artifacts -czf cpp-linux-artifacts.tar.gz bin logs || true
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cpp-linux-artifacts
          path: |
            cpp-linux-artifacts.tar.gz
            artifacts/logs/storage_buffer.txt
            artifacts/logs/lab3.txt
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure (MSVC)
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64
      - name: Build (Release)
        run: cmake --build build --config Release -- /m
      - name: Run Windows executables and package
        shell: powershell
        run: |
          $outDir = "artifacts"
          New-Item -ItemType Directory -Path $outDir\logs -Force | Out-Null
          $sb = "build\storage_buffer\Release\storage_buffer_main.exe"
          $lab = "build\lab3\24bcs10276\Release\lab3_code.exe"
          if (Test-Path $sb) { & $sb *> "$outDir\logs\storage_buffer.txt" } else { "not found" | Out-File "$outDir\logs\storage_buffer.txt" }
          if (Test-Path $lab) { & $lab *> "$outDir\logs\lab3.txt" } else { "not found" | Out-File "$outDir\logs\lab3.txt" }
          New-Item -ItemType Directory -Path $outDir\bin -Force | Out-Null
          if (Test-Path $sb) { Copy-Item $sb $outDir\bin\ -Force }
          if (Test-Path $lab) { Copy-Item $lab $outDir\bin\ -Force }
          $zip = "cpp-windows-artifacts.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "$outDir\bin\*", "$outDir\logs\*" -DestinationPath $zip -Force
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cpp-windows-artifacts
          path: |
            cpp-windows-artifacts.zip
            artifacts\logs\storage_buffer.txt
            artifacts\logs\lab3.txt
